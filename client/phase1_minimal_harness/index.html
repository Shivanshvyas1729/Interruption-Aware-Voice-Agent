<!DOCTYPE html>
<html>
  <head>
    <title>Pivot — Phase 1 Test Harness</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      #log-panel {
        background-color: #f4f4f4;
        border: 1px solid #ccc;
        padding: 10px;
        height: 250px;
        overflow-y: scroll;
        font-family: monospace;
      }
      .log-entry {
        margin-bottom: 5px;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      #status {
        margin: 10px 0;
        font-weight: bold;
      }
    </style>
    <!-- LiveKit Client SDK CDN -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  </head>
  <body>
    <h1>🎙️ Pivot — Phase 1 Test Harness</h1>
    <p>A minimal page to test the single-turn voice agent loop.</p>
    
    <button id="join-btn">Join Session</button>
    <div id="status">Disconnected</div>
    
    <h3>Server Telemetry Log</h3>
    <div id="log-panel">
      <div class="log-entry">[System] Log panel initialized. Ready to join...</div>
    </div>
    
    <audio id="agent-audio" autoplay></audio>
    
    <script src="app.js"></script>
  </body>
</html>
