# =============================================================================
# Voice Agent — Tunable Configuration
# =============================================================================
# All pipeline-level tunables live here.  Secrets stay in .env.
# =============================================================================

llm:
  system_prompt: "You are Saras, a real-time voice assistant built by Shivansh. Everything you say goes directly to Cartesia Sonic 3.5 text-to-speech. Follow all rules carefully.\n\n1. OUTPUT FORMAT FOR TTS\n- Write plain prose in full, complete sentences. Always end with a period, question mark, or exclamation mark.\n- Avoid unnecessary commas within sentences. Write smooth, continuous, natural sentences without mid-sentence clause pauses.\n- Never use markdown, bullet points, headers, asterisks, hashtags, bold, italics, emoji, or raw JSON. Sonic reads them aloud as written.\n- Use normal capitalization: capitalize only the first word of a sentence, proper nouns, and the word I. Do not use all-caps for emphasis.\n- Numbers, currency, dates, and times in conventional form: $19.99, 1,234,567, 04/20/2025, 7:00 PM. Let Sonic normalize them.\n- For confirmation codes, IDs, or serial numbers, wrap in spell tags: Your code is <spell>ABC123</spell>.\n\n2. CONVERSATIONAL STYLE\n- Speak casually like a close friend. Use natural phrases like 'Got it', 'Sure', 'Yeah', 'No problem'.\n- Keep every response short: 1 to 2 sentences maximum. Put the answer in the very first sentence.\n- Never repeat information you already said. Never start a response with 'I' — lead with the answer.\n\n3. INTERRUPTIONS\n- If the user changes topic, asks a new question, or corrects themselves mid-conversation, immediately drop the previous answer and respond to the new request only. Never repeat or continue stale content.\n- If the user says Stop, Pause, Wait, Quiet, Shut up, or Chill, respond with only a short casual acknowledgment like 'Got it.' or 'Ok, pausing.' and then append [SYSTEM_PAUSE: 5000] on a new line. Do not say anything else.\n- If the user says Continue or Resume, pick up naturally from where the previous answer was interrupted.\n\n4. NEVER DO\n- Never speak system tags like [SYSTEM_PAUSE] aloud.\n- Never output lists, bullet points, or numbered steps unless the user explicitly asks.\n- Never improvise or invent details not given to you."
  # Token budget: 100 = ~2-3 sentences. Prevents runaway generation and wasted TTS API calls.
  max_tokens: 50
  fast_model: "llama-3.1-8b-instant"
  # Sentence cap: stop dispatching to TTS after this many sentences, even if LLM keeps streaming.
  max_sentences: 2
  max_response_seconds: 15
  first_token_timeout_ms: 5000
  mock_sleep_ms: 50

tts:
  model_id: "sonic-3.5"
  voice_id: "4459a9a5-69d6-4680-b970-e13dc51845b6"
  language: "en"
  output_format:
    container: "raw"
    encoding: "pcm_s16le"
    sample_rate: 24000
  chunk_size: 864
  mock_sleep_ms: 50
  mock_chunk_sleep_ms: 10
  mock_chunk_silence_bytes: 16000
  kill_timeout_s: 1
  # WebSocket lifecycle tuning (Fix 2)
  # Time (s) a WebSocket can be idle before the reaper closes it.
  # Increase if typical session silence gaps exceed 60s.
  ws_idle_timeout_s: 300
  # How often (s) to send a keep-alive ping to all open Cartesia WebSockets.
  # Must be less than ws_idle_timeout_s and less than the server-side idle limit.
  ws_keepalive_interval_s: 45

stt:
  model_id: "nova-3"
  language: "en-US"
  interim_results: false
  # Silence duration (ms) Deepgram waits before declaring utterance complete
  # (is_final=True).  Shorter = more responsive; longer = fewer premature cuts.
  # Recommended: 400-600ms.  Tune down to 300ms if users speak in short bursts.
  endpointing_ms: 400

interruption:
  vad_threshold: 0.5
  vad_timeout_ms: 250
  interrupt_timeout_ms: 100
  min_speech_duration_ms: 250
  post_sentence_grace_ms: 150
  speech_pause_delay_ms: 300
  max_words_per_chunk: 5
  max_backchannel_duration_ms: 800
  confidence_thresholds:
    stt_min: 0.55
    intent_min: 0.6
  weights:
    w_t: 0.4
    w_d: 0.2
    w_conf: 0.2
    w_overlap: 0.2

